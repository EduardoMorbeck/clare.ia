services:
  backend:
    build: ./backend
    restart: unless-stopped
    # Lê as chaves de API e demais ajustes do .env na raiz do projeto.
    env_file:
      - .env
    environment:
      # Nginx está à frente e envia X-Forwarded-For, então o rate limit por IP
      # pode confiar no cabeçalho para usar o IP real do cliente.
      TRUST_PROXY_HEADERS: "true"
    # Sem "ports": o backend só é acessível pela rede interna (via o frontend).
    # Para depurar direto, descomente:
    # ports:
    #   - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
