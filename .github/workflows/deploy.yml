name: CD (deploy)

# Fase 5 — entrega contínua na AWS via OIDC (sem chave estática no repo).
#  - Em Pull Request: `terraform plan` (role de plan, read-only) e comenta no PR.
#  - No merge para main: `terraform apply` (role de apply, escrita).
on:
  pull_request:
  push:
    branches: [main]

# Permissões do GITHUB_TOKEN deste workflow:
#  - id-token: write  -> OBRIGATÓRIO para o OIDC (gera o token que a AWS troca por
#                        credenciais temporárias). Sem isto, o login federado falha.
#  - contents: read   -> checkout do código.
#  - pull-requests: write -> postar o comentário com o plano no PR.
permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    # Só em Pull Request. (No push para main quem roda é o job `apply`.)
    if: github.event_name == 'pull_request'
    name: Terraform Plan (PR)
    runs-on: ubuntu-latest
    # Evita planos concorrentes do mesmo PR (sem cancelar no meio, para não deixar
    # lock órfão no state).
    concurrency:
      group: cd-plan-${{ github.ref }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      # O archive_file da Lambda lê infra/build/lambda_pkg/, que não está no repo
      # (é artefato recriável). Precisamos empacotar ANTES do terraform, senão o
      # data source falha. build_lambda.py é cross-platform e roda no runner Linux.
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Empacotar a Lambda
        working-directory: .
        run: python infra/build_lambda.py

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      # Login na AWS por OIDC: assume a role de PLAN (read-only). A action gera o
      # token OIDC do GitHub e chama sts:AssumeRoleWithWebIdentity. A role só é
      # assumível em eventos de Pull Request (trust policy travada em :pull_request).
      - name: Login AWS (OIDC, role de plan)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: us-east-1

      # Repo público: registra o account id como valor mascarado, para o GitHub
      # substituí-lo por *** em todo log subsequente (o plano cru imprime os ARNs).
      - name: Mascarar account id nos logs
        run: echo "::add-mask::$(aws sts get-caller-identity --query Account --output text)"

      # Init com backend S3. Só o nome do bucket (que carrega o account id) vem de
      # uma repository variable, para não ficar no yaml do repo público. key/region
      # não são sensíveis.
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.AWS_TFSTATE_BUCKET }}" \
            -backend-config="key=clare-ia/prod/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true" \
            -input=false

      - name: Terraform Plan
        id: plan
        # prod.tfvars (versionado, sem segredo) liga o CloudFront etc. As chaves dos
        # provedores ficam fora: o Terraform ignora o valor dos SecureString (ssm.tf).
        run: terraform plan -input=false -var-file=prod.tfvars -no-color

      # Comenta o plano no PR para revisão humana antes do merge.
      - name: Comentar o plano no PR
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            // Repo público: mascara qualquer sequência de 12 dígitos (account id da
            // AWS) que apareça nos ARNs do plano, mantendo o account id fora do repo.
            let plan = (process.env.PLAN_STDOUT || '(sem saída)').replace(/\d{12}/g, '************');
            const max = 60000;
            if (plan.length > max) plan = plan.substring(0, max) + '\n... (plano truncado)';
            const body = `#### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

            <details><summary>Mostrar plano</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`

            </details>

            *Disparado por @${{ github.actor }} no commit \`${{ github.sha }}\`.*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  apply:
    # Só no push para a main (= merge de um PR). É aqui que a infra é aplicada de
    # verdade na AWS. O plano já foi revisado no PR antes do merge.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Terraform Apply (merge na main)
    runs-on: ubuntu-latest
    # Gate de aprovação: este job só roda depois que um reviewer aprova no GitHub.
    # O Environment "production" (criado em Settings -> Environments) tem um required
    # reviewer; ao referenciá-lo aqui, o GitHub PAUSA o apply esperando o "approve"
    # antes de tocar na AWS. Sem o reviewer configurado, não há pausa.
    environment: production
    # Serializa os applies: nunca dois ao mesmo tempo (evita corrida no state/lock).
    concurrency:
      group: cd-apply-main
      cancel-in-progress: false
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Empacotar a Lambda
        working-directory: .
        run: python infra/build_lambda.py

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      # Login na AWS por OIDC: assume a role de APPLY (escrita). Ela só é assumível
      # em jobs rodando NA branch main (trust policy travada em ref:refs/heads/main).
      - name: Login AWS (OIDC, role de apply)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_APPLY_ROLE_ARN }}
          aws-region: us-east-1

      # Repo público: mascara o account id (o apply imprime os ARNs e o s3 sync
      # imprime o nome do bucket, ambos com o account id) em todo log subsequente.
      - name: Mascarar account id nos logs
        run: echo "::add-mask::$(aws sts get-caller-identity --query Account --output text)"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.AWS_TFSTATE_BUCKET }}" \
            -backend-config="key=clare-ia/prod/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true" \
            -input=false

      - name: Terraform Apply
        # prod.tfvars (sem segredo) liga o CloudFront etc.; os SecureString têm o
        # valor ignorado (ssm.tf), então o apply nunca toca nas chaves dos provedores.
        run: terraform apply -input=false -auto-approve -var-file=prod.tfvars

      # Lê os outputs do state (após o apply) para saber para onde subir o frontend.
      - name: Capturar outputs do Terraform
        id: tfout
        run: |
          echo "bucket=$(terraform output -raw frontend_bucket)" >> "$GITHUB_OUTPUT"
          echo "dist_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build do frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Subir o frontend no S3
        working-directory: frontend
        # assets/* têm hash no nome -> cache "immutable" de 1 ano; --delete remove os
        # arquivos antigos. O index.html vai por último, com no-cache (sempre fresco):
        # senão o navegador serviria um HTML velho apontando para assets que já sumiram.
        run: |
          aws s3 sync dist "s3://${{ steps.tfout.outputs.bucket }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html "s3://${{ steps.tfout.outputs.bucket }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      # Invalida o cache do CDN para os usuários verem a versão nova imediatamente.
      - name: Invalidar o cache do CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tfout.outputs.dist_id }}" \
            --paths "/*"
