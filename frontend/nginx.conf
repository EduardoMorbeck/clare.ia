server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida cai no index.html (roteamento no cliente).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para o backend FastAPI. O frontend chama /api/chat (relativo),
    # então aqui repassamos para o serviço "backend" da rede do docker compose.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Cadeia de IPs para o rate limit do backend (ver TRUST_PROXY_HEADERS).
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
